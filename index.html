<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels — магазин іграшок</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo">HOT WHEELS <span>STORE</span></div>
        <nav class="main-nav">
            <a href="index.html" class="active">Головна</a>
            <a href="catalog.html">Каталог</a>
            <a href="about.html">Про нас</a>
        </nav>
        <div class="user-block">
            <span id="userGreeting" class="user-greeting"></span>
            <button id="logoutBtn" class="btn-outline" style="display: none;">Вихід</button>
            <button class="btn-auth" id="loginBtn">Вхід</button>
            <a href="cart.html" class="cart-icon">
                🛒 <span id="cartCount" class="badge">0</span>
            </a>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Магазин іграшок Hot Wheels</h1>
        <p>Машинки, треки, конструктори та аксесуари для дітей будь-якого віку</p>
        <a href="catalog.html" class="btn-main">Перейти до каталогу</a>
    </div>
</section>

<section class="featured">
    <div class="container">
        <h2>Популярні товари</h2>
        <div id="featuredGrid" class="grid"></div>
    </div>
</section>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeAuthModal()">&times;</span>
        <h2><i class="fas fa-key"></i> Вхід / Реєстрація</h2>
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Вхід</button>
            <button class="tab-btn" data-tab="register">Реєстрація</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="text" id="loginUsername" placeholder="Логін">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button class="btn-main" onclick="processLogin()">Увійти</button>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regUsername" placeholder="Логін">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="password" id="regConfirm" placeholder="Підтвердити пароль">
            <button class="btn-main" onclick="processRegister()">Зареєструватися</button>
        </div>
    </div>
</div>

<footer>
    <div class="footer-content">
        <p>© 2025 Hot Wheels Магазин іграшок</p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
