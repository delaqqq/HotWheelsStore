<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Каталог - Wheels Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header>
    <div class="header-container">
        <div class="logo">HOT WHEELS <span>STORE</span></div>
        <nav class="main-nav">
            <a href="index.html">Головна</a>
            <a href="catalog.html" class="active">Каталог</a>
            <a href="about.html">Про нас</a>
        </nav>
        <div class="user-block">
            <span id="userGreeting" class="user-greeting"></span>
            <button id="logoutBtn" class="btn-outline" style="display: none;">Вихід</button>
            <button class="btn-auth" id="loginBtn">Вхід</button>
            <a href="cart.html" class="cart-icon">🛒 <span id="cartCount" class="badge">0</span></a>
        </div>
    </div>
</header>

<div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="🔍 Пошук за назвою...">
</div>

<div class="catalog-layout">
    <aside class="sidebar">
        <h3>Категорії</h3>
        <ul id="categoriesList">
            <li data-category="all" class="active">Всі товари</li>
        </ul>
    </aside>
    <main class="catalog-content">
        <div id="catalog" class="grid"></div>
    </main>
</div>

<!-- Модальне вікно детального опису -->
<div id="productModal" class="modal">
    <div class="modal-content product-modal">
        <span class="close" onclick="closeProductModal()">&times;</span>
        <div id="productModalBody"></div>
    </div>
</div>

<footer><div class="footer-content"><p>© 2025 Wheels Store Магазин іграшок</p></div></footer>
<script src="script.js"></script>
</body>
</html>
